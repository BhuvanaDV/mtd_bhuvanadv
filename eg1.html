<!DOCTYPE html>
<html>
<head>
    <title>My First HTML and CSS Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: lightblue;
            text-align: center;
        }

        h1 {
            color: darkblue;
        }

        p {
            color: green;
            font-size: 20px;
        }

        .box {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border: 2px solid blue;
            border-radius: 10px;
        }

        button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Welcome to HTML & CSS</h1>
        <p>This is my first web page.</p>
        <button>Click Me</button>
    </div>

</body>
</html>
